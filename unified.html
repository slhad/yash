<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YASH - Unified Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
                                                            body {
                                                              background: #0f0f1a;
                                                              color: #e0e0e0;
                                                              font-family: 'Courier New', Courier, monospace;
                                                              font-size: 14px;
                                                              height: 100vh;
                                                              display: flex;
                                                              flex-direction: column;
                                                            }
                                                            header {
                                                              background: #1a1a2e;
                                                              border-bottom: 1px solid #2a2a4a;
                                                              padding: 8px 12px;
                                                              display: flex;
                                                              align-items: center;
                                                              justify-content: space-between;
                                                              flex-shrink: 0;
                                                            }
                                                            header h1 {
                                                              color: #00c8ff;
                                                              font-size: 15px;
                                                              font-weight: bold;
                                                            }
                                                            #position-btn {
                                                              background: #2a2a4a;
                                                              border: 1px solid #3a3a6a;
                                                              color: #a0a0c0;
                                                              padding: 4px 10px;
                                                              border-radius: 4px;
                                                              cursor: pointer;
                                                              font-family: inherit;
                                                              font-size: 13px;
                                                            }
                                                            #position-btn:hover { background: #3a3a5a; color: #e0e0e0; }
                                                            #messages {
                                                              flex: 1;
                                                              overflow-y: auto;
                                                              padding: 8px 12px;
                                                              display: flex;
                                                              flex-direction: column;
                                                              gap: 3px;
                                                            }
                                                            #messages::-webkit-scrollbar { width: 6px; }
                                                            #messages::-webkit-scrollbar-track { background: #1a1a2e; }
                                                            #messages::-webkit-scrollbar-thumb { background: #3a3a6a; border-radius: 3px; }
                                                            .msg {
                                                              line-height: 1.4;
                                                              word-break: break-word;
                                                            }
                                                            .msg .platform-tag {
                                                              font-size: 11px;
                                                              padding: 1px 5px;
                                                              border-radius: 3px;
                                                              margin-right: 4px;
                                                              font-weight: bold;
                                                            }
                                                            .tag-youtube { background: #cc0000; color: #fff; }
                                                            .tag-twitch  { background: #6441a5; color: #fff; }
                                                            .tag-kick    { background: #53fc18; color: #111; }
                                                            .tag-unknown { background: #444; color: #ccc; }
                                                            .msg .username { color: #00c8ff; margin-right: 4px; }
                                                            .msg .text { color: #e0e0e0; }
                                                            #msgbox {
                                                              background: #1a1a2e;
                                                              border-top: 1px solid #2a2a4a;
                                                              padding: 8px 12px;
                                                              display: flex;
                                                              gap: 6px;
                                                              align-items: flex-end;
                                                              flex-shrink: 0;
                                                            }
                                                            #msgbox.position-top {
                                                              order: -1;
                                                              border-top: none;
                                                              border-bottom: 1px solid #2a2a4a;
                                                            }
                                                            #platform-select {
                                                              background: #2a2a4a;
                                                              border: 1px solid #3a3a6a;
                                                              color: #e0e0e0;
                                                              padding: 6px 8px;
                                                              border-radius: 4px;
                                                              font-family: inherit;
                                                              font-size: 13px;
                                                              flex-shrink: 0;
                                                            }
                                                            #message-input {
                                                              flex: 1;
                                                              background: #2a2a4a;
                                                              border: 1px solid #3a3a6a;
                                                              color: #e0e0e0;
                                                              padding: 6px 8px;
                                                              border-radius: 4px;
                                                              font-family: inherit;
                                                              font-size: 13px;
                                                              resize: none;
                                                              min-height: 34px;
                                                              max-height: 80px;
                                                            }
                                                            #message-input:focus, #platform-select:focus {
                                                              outline: none;
                                                              border-color: #00c8ff;
                                                            }
                                                            #autocomplete-hint {
                                                              font-size: 11px;
                                                              color: #5a7a9a;
                                                              font-family: 'Courier New', Courier, monospace;
                                                              padding: 2px 4px;
                                                              min-height: 16px;
                                                            }
                                                            #send-btn {
                                                              background: #00c8ff;
                                                              border: none;
                                                              color: #0f0f1a;
                                                              padding: 6px 14px;
                                                              border-radius: 4px;
                                                              font-family: inherit;
                                                              font-size: 13px;
                                                              font-weight: bold;
                                                              cursor: pointer;
                                                              flex-shrink: 0;
                                                              height: 34px;
                                                            }
                                                            #send-btn:hover { background: #00a8df; }
                                                            #send-btn:disabled { background: #3a3a5a; color: #666; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>YASH — Unified Chat</h1>
    <button id="position-btn" title="Toggle message box position">position: bottom ▼</button>
  </header>

  <div id="messages"></div>

  <div id="msgbox" style="flex-direction: column; gap: 0;">
    <div style="display: flex; gap: 6px; align-items: flex-end; width: 100%;">
      <select id="platform-select" title="Target platform">
        <option value="all">all</option>
        <option value="youtube">youtube</option>
        <option value="twitch">twitch</option>
        <option value="kick">kick</option>
      </select>
      <textarea id="message-input" rows="1" placeholder="Type a message or /help for commands…"></textarea>
      <button id="send-btn">Send</button>
    </div>
    <div id="autocomplete-hint"></div>
  </div>

  <script type="module">
    import { getWebAutocomplete, handleWebCommand } from '/api/js/commands.js';

                                                    const STORAGE_KEY = 'yash_msgbox_position';
                                                            const POSITIONS = ['bottom', 'top', 'hide'];

                                                            const messagesEl = document.getElementById('messages');
                                                            const msgboxEl = document.getElementById('msgbox');
                                                            const positionBtn = document.getElementById('position-btn');
                                                            const platformSelect = document.getElementById('platform-select');
                                                            const messageInput = document.getElementById('message-input');
                                                            const sendBtn = document.getElementById('send-btn');
                                                            const autocompleteHint = document.getElementById('autocomplete-hint');

                                                            const inputHistory = [];
                                                            let historyIdx = -1;

                                                            const knownIds = new Set();
                                                            let currentPosition = localStorage.getItem(STORAGE_KEY) || 'bottom';

                                                            function applyPosition(pos) {
                                                              currentPosition = pos;
                                                              localStorage.setItem(STORAGE_KEY, pos);

                                                              msgboxEl.classList.remove('position-top');

                                                              if (pos === 'hide') {
                                                                msgboxEl.style.display = 'none';
                                                                positionBtn.textContent = 'position: hide ●';
                                                              } else if (pos === 'top') {
                                                                msgboxEl.style.display = 'flex';
                                                                msgboxEl.classList.add('position-top');
                                                                positionBtn.textContent = 'position: top ▲';
                                                              } else {
                                                                msgboxEl.style.display = 'flex';
                                                                positionBtn.textContent = 'position: bottom ▼';
                                                              }
                                                            }

                                                            positionBtn.addEventListener('click', () => {
                                                              const idx = POSITIONS.indexOf(currentPosition);
                                                              const next = POSITIONS[(idx + 1) % POSITIONS.length];
                                                              applyPosition(next);
                                                            });

                                                            applyPosition(currentPosition);

                                                            function platformTag(platform) {
                                                              const cls = ['youtube', 'twitch', 'kick'].includes(platform)
                                                                ? 'tag-' + platform
                                                                : 'tag-unknown';
                                                              return `<span class="platform-tag ${cls}">${platform}</span>`;
                                                            }

                                                            function renderMessage(msg) {
                                                              const div = document.createElement('div');
                                                              div.className = 'msg';
                                                              div.innerHTML =
                                                                platformTag(msg.platform) +
                                                                `<span class="username">${escapeHtml(msg.username)}:</span>` +
                                                                `<span class="text">${escapeHtml(msg.message)}</span>`;
                                                              return div;
                                                            }

                                                            function escapeHtml(str) {
                                                              return String(str)
                                                                .replace(/&/g, '&amp;')
                                                                .replace(/</g, '&lt;')
                                                                .replace(/>/g, '&gt;')
                                                                .replace(/"/g, '&quot;');
                                                            }

                                                            let isAtBottom = true;
                                                            messagesEl.addEventListener('scroll', () => {
                                                              isAtBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 32;
                                                            });

                                                            function appendMessages(msgs) {
                                                              let added = false;
                                                              for (const msg of msgs) {
                                                                if (knownIds.has(msg.id)) continue;
                                                                knownIds.add(msg.id);
                                                                messagesEl.appendChild(renderMessage(msg));
                                                                added = true;
                                                              }
                                                              if (added && isAtBottom) {
                                                                messagesEl.scrollTop = messagesEl.scrollHeight;
                                                              }
                                                            }

                                                            async function fetchHistory() {
                                                              try {
                                                                const res = await fetch('/api/chat/history');
                                                                if (!res.ok) return;
                                                                const msgs = await res.json();
                                                                appendMessages(msgs);
                                                              } catch (_) {}
                                                            }

                                                            fetchHistory();
                                                            setInterval(fetchHistory, 2000);

                                                            // Append a system feedback line to the message feed (UI-only, stays local)
                                                            function appendSystem(label, text) {
                                                              const div = document.createElement('div');
                                                              div.className = 'msg';
                                                              div.innerHTML = `<span class="platform-tag tag-unknown">${escapeHtml(label)}</span><span class="text">${escapeHtml(text)}</span>`;
                                                              messagesEl.appendChild(div);
                                                              if (isAtBottom) messagesEl.scrollTop = messagesEl.scrollHeight;
                                                            }

                                                            async function sendMessage() {
                                                              const text = messageInput.value.trim();
                                                              if (!text) return;

                                                              const platform = platformSelect.value;
                                                              const platforms = platform === 'all' ? [] : [platform];

                                                              inputHistory.push(text);
                                                              historyIdx = -1;

                                                              sendBtn.disabled = true;

                                                              // Delegate / commands to the shared handler from /api/js/commands.js
                                                              const handled = await handleWebCommand(text, { platforms, feedback: appendSystem });
                                                              if (handled) {
                                                                messageInput.value = '';
                                                                messageInput.style.height = 'auto';
                                                                autocompleteHint.textContent = '';
                                                                sendBtn.disabled = false;
                                                                messageInput.focus();
                                                                return;
                                                              }

                                                              try {
                                                                const res = await fetch('/api/chat/send', {
                                                                  method: 'POST',
                                                                  headers: { 'Content-Type': 'application/json' },
                                                                  body: JSON.stringify({ message: text, platforms }),
                                                                });
                                                                if (res.ok) {
                                                                  messageInput.value = '';
                                                                  messageInput.style.height = 'auto';
                                                                  autocompleteHint.textContent = '';
                                                                  await fetchHistory();
                                                                }
                                                              } catch (_) {}
                                                              sendBtn.disabled = false;
                                                              messageInput.focus();
                                                            }

                                                            sendBtn.addEventListener('click', sendMessage);
                                                            messageInput.addEventListener('keydown', (e) => {
                                                              if (e.key === 'ArrowUp') {
                                                                e.preventDefault();
                                                                if (inputHistory.length === 0) return;
                                                                if (historyIdx === -1) historyIdx = inputHistory.length - 1;
                                                                else if (historyIdx > 0) historyIdx--;
                                                                messageInput.value = inputHistory[historyIdx];
                                                                messageInput.style.height = 'auto';
                                                                messageInput.style.height = Math.min(messageInput.scrollHeight, 80) + 'px';
                                                                return;
                                                              }
                                                              if (e.key === 'ArrowDown') {
                                                                e.preventDefault();
                                                                if (historyIdx === -1) return;
                                                                historyIdx++;
                                                                if (historyIdx >= inputHistory.length) {
                                                                  historyIdx = -1;
                                                                  messageInput.value = '';
                                                                } else {
                                                                  messageInput.value = inputHistory[historyIdx];
                                                                }
                                                                messageInput.style.height = 'auto';
                                                                messageInput.style.height = Math.min(messageInput.scrollHeight, 80) + 'px';
                                                                return;
                                                              }
                                                              if (e.key === 'Enter' && !e.shiftKey) {
                                                                e.preventDefault();
                                                                sendMessage();
                                                              }
                                                            });

                                                            // Auto-resize textarea + live autocomplete hint
                                                            messageInput.addEventListener('input', () => {
                                                              historyIdx = -1;
                                                              messageInput.style.height = 'auto';
                                                              messageInput.style.height = Math.min(messageInput.scrollHeight, 80) + 'px';
                                                              const hint = getWebAutocomplete(messageInput.value);
                                                              autocompleteHint.textContent = hint ?? '';
                                                            });
  </script>
</body>
</html>
