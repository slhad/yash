<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YASH - Unified Chat</title>
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body class="yash-unified">
  <header>
    <h1>YASH — Unified Chat</h1>
    <button id="position-btn" title="Toggle message box position">position: bottom ▼</button>
  </header>

  <div id="status-bar">
    <span id="status-platforms">loading…</span>
  </div>

  <div id="messages"></div>

  <div id="msgbox">
    <div class="yash-msgbox-row">
      <select id="platform-select" title="Target platform">
        <option value="all">all</option>
        <option value="youtube">youtube</option>
        <option value="twitch">twitch</option>
        <option value="kick">kick</option>
      </select>
      <textarea id="message-input" rows="1" placeholder="Type a message or /help for commands…"></textarea>
      <button id="send-btn">Send</button>
    </div>
    <div id="autocomplete-hint"></div>
  </div>

  <script type="module">
    import { getWebAutocomplete, handleWebCommand } from '/api/js/commands.js';

                                                                                    function formatElapsed(isoStart) {
                                                                                      const secs = Math.floor((Date.now() - new Date(isoStart).getTime()) / 1000);
                                                                                      const h = Math.floor(secs / 3600);
                                                                                      const m = Math.floor((secs % 3600) / 60);
                                                                                      const s = secs % 60;
                                                                                      return h > 0 ? `${h}h${m}m${s}s` : `${m}m${s}s`;
                                                                                    }

                                                                                    const STORAGE_KEY = 'yash_msgbox_position';
                                                                                            const POSITIONS = ['bottom', 'top', 'hide'];

                                                                                            const messagesEl = document.getElementById('messages');
                                                                                            const msgboxEl = document.getElementById('msgbox');
                                                                                            const positionBtn = document.getElementById('position-btn');
                                                                                            const platformSelect = document.getElementById('platform-select');
                                                                                            const messageInput = document.getElementById('message-input');
                                                                                            const sendBtn = document.getElementById('send-btn');
                                                                                            const autocompleteHint = document.getElementById('autocomplete-hint');

                                                                                            const inputHistory = [];
                                                                                            let historyIdx = -1;

                                                                                            const knownIds = new Set();
                                                                                            let currentPosition = localStorage.getItem(STORAGE_KEY) || 'bottom';

                                                                                            function applyPosition(pos) {
                                                                                              currentPosition = pos;
                                                                                              localStorage.setItem(STORAGE_KEY, pos);

                                                                                              msgboxEl.classList.remove('position-top');

                                                                                              if (pos === 'hide') {
                                                                                                msgboxEl.style.display = 'none';
                                                                                                positionBtn.textContent = 'position: hide ●';
                                                                                              } else if (pos === 'top') {
                                                                                                msgboxEl.style.display = 'flex';
                                                                                                msgboxEl.classList.add('position-top');
                                                                                                positionBtn.textContent = 'position: top ▲';
                                                                                              } else {
                                                                                                msgboxEl.style.display = 'flex';
                                                                                                positionBtn.textContent = 'position: bottom ▼';
                                                                                              }
                                                                                            }

                                                                                            positionBtn.addEventListener('click', () => {
                                                                                              const idx = POSITIONS.indexOf(currentPosition);
                                                                                              const next = POSITIONS[(idx + 1) % POSITIONS.length];
                                                                                              applyPosition(next);
                                                                                            });

                                                                                            applyPosition(currentPosition);

                                                                                            function platformTag(platform) {
                                                                                              const cls = ['youtube', 'twitch', 'kick'].includes(platform)
                                                                                                ? `tag-${platform}`
                                                                                                : 'tag-unknown';
                                                                                              return `<span class="platform-tag ${cls}">${platform}</span>`;
                                                                                            }

                                                                                            function renderMessage(msg) {
                                                                                              const div = document.createElement('div');
                                                                                              div.className = 'msg';
                                                                                              div.innerHTML =
                                                                                                platformTag(msg.platform) +
                                                                                                `<span class="username">${escapeHtml(msg.username)}:</span>` +
                                                                                                `<span class="text">${escapeHtml(msg.message)}</span>`;
                                                                                              return div;
                                                                                            }

                                                                                            function escapeHtml(str) {
                                                                                              return String(str)
                                                                                                .replace(/&/g, '&amp;')
                                                                                                .replace(/</g, '&lt;')
                                                                                                .replace(/>/g, '&gt;')
                                                                                                .replace(/"/g, '&quot;');
                                                                                            }

                                                                                            let isAtBottom = true;
                                                                                            messagesEl.addEventListener('scroll', () => {
                                                                                              isAtBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 32;
                                                                                            });

                                                                                            function appendMessages(msgs) {
                                                                                              let added = false;
                                                                                              for (const msg of msgs) {
                                                                                                if (knownIds.has(msg.id)) continue;
                                                                                                knownIds.add(msg.id);
                                                                                                messagesEl.appendChild(renderMessage(msg));
                                                                                                added = true;
                                                                                              }
                                                                                              if (added && isAtBottom) {
                                                                                                messagesEl.scrollTop = messagesEl.scrollHeight;
                                                                                              }
                                                                                            }

                                                                                            async function fetchHistory() {
                                                                                              try {
                                                                                                const res = await fetch('/api/chat/history');
                                                                                                if (!res.ok) return;
                                                                                                const msgs = await res.json();
                                                                                                appendMessages(msgs);
                                                                                              } catch (_) {}
                                                                                            }

                                                                                            fetchHistory();
                                                                                            setInterval(fetchHistory, 2000);

                                                                                            const statusPlatformsEl = document.getElementById('status-platforms');
                                                                                            async function fetchStatus() {
                                                                                              try {
                                                                                                const res = await fetch('/api/status');
                                                                                                if (!res.ok) return;
                                                                                                const data = await res.json();
                                                                                                const parts = [];
                                                                                                for (const [name, info] of Object.entries(data)) {
                                                                                                  if (!info || typeof info !== 'object') continue;
                                                                                                  const { streamStatus, viewerCount, streamStartTime } = info;
                                                                                                  if (streamStatus === 'ONLINE') {
                                                                                                    let detail = '';
                                                                                                    if (streamStartTime) detail += formatElapsed(streamStartTime);
                                                                                                    if (viewerCount != null) detail += `${detail ? ' / ' : ''}${viewerCount} viewers`;
                                                                                                    const label = name.charAt(0).toUpperCase() + name.slice(1);
                                                                                                    parts.push(`<span class="online">${escapeHtml(label)}: ONLINE${detail ? ` (${escapeHtml(detail)})` : ''}</span>`);
                                                                                                  } else {
                                                                                                    const label = name.charAt(0).toUpperCase() + name.slice(1);
                                                                                                    parts.push(`<span class="offline">${escapeHtml(label)}: offline</span>`);
                                                                                                  }
                                                                                                }
                                                                                                statusPlatformsEl.innerHTML = parts.join('<span class="yash-status-separator"> | </span>') || 'no platforms';
                                                                                              } catch (_) {}
                                                                                            }

                                                                                            fetchStatus();
                                                                                            setInterval(fetchStatus, 3000);

                                                                                            // Append a system feedback line to the message feed (UI-only, stays local)
                                                                                            function appendSystem(label, text) {
                                                                                              const div = document.createElement('div');
                                                                                              div.className = 'msg';
                                                                                              div.innerHTML = `<span class="platform-tag tag-unknown">${escapeHtml(label)}</span><span class="text">${escapeHtml(text)}</span>`;
                                                                                              messagesEl.appendChild(div);
                                                                                              if (isAtBottom) messagesEl.scrollTop = messagesEl.scrollHeight;
                                                                                            }

                                                                                            async function sendMessage() {
                                                                                              const text = messageInput.value.trim();
                                                                                              if (!text) return;

                                                                                              const platform = platformSelect.value;
                                                                                              const platforms = platform === 'all' ? [] : [platform];

                                                                                              inputHistory.push(text);
                                                                                              historyIdx = -1;

                                                                                              sendBtn.disabled = true;

                                                                                              // Delegate / commands to the shared handler from /api/js/commands.js
                                                                                              const handled = await handleWebCommand(text, { platforms, feedback: appendSystem });
                                                                                              if (handled) {
                                                                                                messageInput.value = '';
                                                                                                messageInput.style.height = 'auto';
                                                                                                autocompleteHint.textContent = '';
                                                                                                sendBtn.disabled = false;
                                                                                                messageInput.focus();
                                                                                                return;
                                                                                              }

                                                                                              try {
                                                                                                const res = await fetch('/api/chat/send', {
                                                                                                  method: 'POST',
                                                                                                  headers: { 'Content-Type': 'application/json' },
                                                                                                  body: JSON.stringify({ message: text, platforms }),
                                                                                                });
                                                                                                if (res.ok) {
                                                                                                  messageInput.value = '';
                                                                                                  messageInput.style.height = 'auto';
                                                                                                  autocompleteHint.textContent = '';
                                                                                                  await fetchHistory();
                                                                                                }
                                                                                              } catch (_) {}
                                                                                              sendBtn.disabled = false;
                                                                                              messageInput.focus();
                                                                                            }

                                                                                            sendBtn.addEventListener('click', sendMessage);
                                                                                            messageInput.addEventListener('keydown', (e) => {
                                                                                              if (e.key === 'ArrowUp') {
                                                                                                e.preventDefault();
                                                                                                if (inputHistory.length === 0) return;
                                                                                                if (historyIdx === -1) historyIdx = inputHistory.length - 1;
                                                                                                else if (historyIdx > 0) historyIdx--;
                                                                                                messageInput.value = inputHistory[historyIdx];
                                                                                                messageInput.style.height = 'auto';
                                                                                                messageInput.style.height = `${Math.min(messageInput.scrollHeight, 80)}px`;
                                                                                                return;
                                                                                              }
                                                                                              if (e.key === 'ArrowDown') {
                                                                                                e.preventDefault();
                                                                                                if (historyIdx === -1) return;
                                                                                                historyIdx++;
                                                                                                if (historyIdx >= inputHistory.length) {
                                                                                                  historyIdx = -1;
                                                                                                  messageInput.value = '';
                                                                                                } else {
                                                                                                  messageInput.value = inputHistory[historyIdx];
                                                                                                }
                                                                                                messageInput.style.height = 'auto';
                                                                                                messageInput.style.height = `${Math.min(messageInput.scrollHeight, 80)}px`;
                                                                                                return;
                                                                                              }
                                                                                              if (e.key === 'Enter' && !e.shiftKey) {
                                                                                                e.preventDefault();
                                                                                                sendMessage();
                                                                                              }
                                                                                            });

                                                                                            // Auto-resize textarea + live autocomplete hint
                                                                                            messageInput.addEventListener('input', () => {
                                                                                              historyIdx = -1;
                                                                                              messageInput.style.height = 'auto';
                                                                                              messageInput.style.height = `${Math.min(messageInput.scrollHeight, 80)}px`;
                                                                                              const hint = getWebAutocomplete(messageInput.value);
                                                                                              autocompleteHint.textContent = hint ?? '';
                                                                                            });
  </script>
</body>
</html>
