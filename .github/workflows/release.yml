name: Build AppImage

on:
  push:
    tags:
      - "v*"
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: appimage-${{ github.workflow }}-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  build-appimage:
    name: Build AppImage (Linux x86_64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Resolve build metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            release_tag="${GITHUB_REF_NAME}"
            artifact_name="yash-${GITHUB_REF_NAME}-x86_64.AppImage"
            is_release=true
          else
            version="nightly-$(date -u +%Y%m%d)"
            release_tag=""
            artifact_name="yash-${version}-${GITHUB_SHA::7}-x86_64.AppImage"
            is_release=false
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${artifact_name}" >> "$GITHUB_OUTPUT"
          echo "is_release=${is_release}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pre-build web assets
        run: bun run build:web

      - name: Build standalone binary
        run: |
          mkdir -p dist
          bun build --compile --target=bun-linux-x64 src/index.tsx --outfile dist/yash

      - name: Create AppDir
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        shell: bash
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/icons/hicolor/scalable/apps

          cp dist/yash AppDir/usr/bin/yash

          cat > AppDir/AppRun <<'APPRUN'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/yash" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          cat > AppDir/yash.desktop <<DESKTOP
          [Desktop Entry]
          Name=YASH
          Comment=Yet Another Streamer Helper
          Exec=yash
          Icon=yash
          Type=Application
          Categories=Utility;Network;
          Terminal=true
          X-AppImage-Version=${VERSION}
          DESKTOP

          cat > AppDir/yash.svg <<'SVG'
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
            <rect width="256" height="256" rx="48" fill="#1a1a2e" />
            <path d="M69 64h43l18 39 18-39h43l-41 76v52h-44v-52z" fill="#e94560" />
          </svg>
          SVG

          cp AppDir/yash.svg AppDir/usr/share/icons/hicolor/scalable/apps/yash.svg
          ln -sf yash.svg AppDir/.DirIcon

      - name: Download appimagetool
        shell: bash
        run: |
          wget -q -O appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          ARCH: x86_64
          APPIMAGE_NAME: ${{ steps.meta.outputs.artifact_name }}
        run: ./appimagetool AppDir "${APPIMAGE_NAME}"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ${{ steps.meta.outputs.artifact_name }}
          if-no-files-found: error

      - name: Publish tagged release
        if: steps.meta.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          name: ${{ steps.meta.outputs.release_tag }}
          files: ${{ steps.meta.outputs.artifact_name }}
          generate_release_notes: true
