name: Release

on:
  push:
    branches: [main, master]
    paths:
      - package.json

permissions:
  contents: write

jobs:
  check-version:
    name: Check version bump
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      tag: ${{ steps.read.outputs.tag }}
      exists: ${{ steps.check.outputs.exists }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: read
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          if git tag --list "${{ steps.read.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  build-appimage:
    name: Build AppImage (Linux x86_64)
    needs: check-version
    if: needs.check-version.outputs.exists == 'false'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: stable

      - name: Install dependencies
        run: bun install

      - name: Pre-build web assets
        run: bun run build:web

      - name: Build standalone binary
        run: bun build --compile --target=bun-linux-x64 src/index.tsx --outfile dist/yash

      - name: Create AppDir
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/icons/hicolor/256x256/apps

          cp dist/yash AppDir/usr/bin/yash

          cat > AppDir/AppRun <<'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/yash" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          cat > AppDir/yash.desktop <<'DESKTOP'
          [Desktop Entry]
          Name=YASH
          Comment=Yet Another Stream Hub
          Exec=yash
          Icon=yash
          Type=Application
          Categories=Utility;Network;
          Terminal=true
          DESKTOP

          convert -size 256x256 xc:'#1a1a2e' \
            -fill '#e94560' -draw "roundrectangle 32,32 224,224 20,20" \
            -fill white -pointsize 100 -gravity center -annotate 0 "Y" \
            AppDir/yash.png
          cp AppDir/yash.png AppDir/usr/share/icons/hicolor/256x256/apps/yash.png

      - name: Download appimagetool
        run: |
          wget -q -O appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

      - name: Build AppImage
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          ARCH: x86_64
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: ./appimagetool AppDir "yash-v${VERSION}-x86_64.AppImage"

      - name: Tag and release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: ${{ needs.check-version.outputs.tag }}
          files: yash-v*-x86_64.AppImage
          generate_release_notes: true
