name: Publish Docker Image

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*.*.*'

jobs:
  build-and-push:
    name: Build and push Docker image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/yash-ci:latest
            ghcr.io/${{ github.repository }}/yash-ci:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/yash-ci:latest
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/yash-ci:latest,mode=max

      - name: Output image info
        run: |
          echo "Image published to ghcr.io/${{ github.repository }}/yash-ci:latest"
