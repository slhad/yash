name: E2E Tests (Playwright)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch: {}

jobs:
  e2e:
    name: Run end-to-end tests with Playwright
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Prepare local config
        run: |
          if [ -f config.example.json ] && [ ! -f config.json ]; then
            cp config.example.json config.json
            echo "Created local config.json from config.example.json"
          fi

      - name: Start app server (background)
        run: |
          bun run src/index.ts &
          echo $! > .server.pid
          # Wait for the server to become available (port 3000)
          for i in {1..15}; do
            if curl -sSf http://localhost:3000 >/dev/null 2>&1; then
              echo "Server is up"
              break
            fi
            echo "Waiting for server... ($i)"
            sleep 1
          done

      - name: Run Playwright tests
        run: npx playwright test --reporter=list

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Stop app server
        if: always()
        run: |
          if [ -f .server.pid ]; then
            kill $(cat .server.pid) || true
            rm .server.pid || true
          fi
