name: Hermetic Smoke After Publish

on:
  workflow_run:
    workflows:
      - "Publish Docker Image"
    types:
      - completed

jobs:
  smoke:
    name: Run hermetic smoke using published image
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull published image
        run: |
          echo "Pulling image ghcr.io/${{ github.repository }}/yash-ci:latest"
          docker pull ghcr.io/${{ github.repository }}/yash-ci:latest

      - name: Run hermetic smoke inside published image
        run: |
          mkdir -p tmp
          CONTAINER_NAME="yash-ci-smoke-$(date +%s)-$RANDOM"
          # Run the smoke container as the host runner user so artifacts written
          # into the mounted tmp directory are owned by the runner and can be
          # uploaded by actions/upload-artifact without UID/GID surprises.
          docker run --name "$CONTAINER_NAME" --user "$(id -u):$(id -g)" -e RUN_PLAYWRIGHT=1 -e HOST_UID="$(id -u)" -e HOST_GID="$(id -g)" -v "${{ github.workspace }}/tmp:/app/tmp" ghcr.io/${{ github.repository }}/yash-ci:latest /bin/bash -lc '
            set -euo pipefail

            echo "Starting server inside container"
            bun run src/index.ts &
            pid=$!

            echo "Waiting for server readiness"
            for i in $(seq 1 60); do
              if curl -sSf http://localhost:3000/api/status -o /dev/null; then
                echo "Server ready"
                break
              fi
              sleep 1
            done
            if ! curl -sSf http://localhost:3000/api/status -o /dev/null; then
              echo "Server failed to start" >&2
              ps aux || true
              exit 1
            fi

            echo "Running Playwright webview test (smoke)"
            npx playwright test e2e-tests/webview.spec.ts --reporter=list || true

            echo "Running reconnection integration test (smoke)"
            bun test test/obs.websocket.reconnect.test.ts --reporter=list || true

            echo "Running artifact verification (skipped - repository does not include verification helpers)"
            # Verification helper scripts were removed from this repository.
            # If you want artifact verification here, add a small verifier script
            # to your CI tooling and invoke it in this step.

            echo "Hermetic smoke finished"
          '

          RUN_EXIT=$?
          echo "Container $CONTAINER_NAME exited with status $RUN_EXIT"
          echo "Attempting to docker cp /app/tmp from container to host tmp/ (if present)"
          mkdir -p tmp || true
          docker cp "$CONTAINER_NAME":/app/tmp/. tmp/ || echo "docker cp failed or no files present"
          docker rm -f "$CONTAINER_NAME" || true
          if [ $RUN_EXIT -ne 0 ]; then
            exit $RUN_EXIT
          fi

      - name: Upload hermetic smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hermetic-smoke-artifacts
          path: tmp/**
