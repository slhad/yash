name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  secret-scan:
    name: Scan repository for likely plaintext secrets (blocking)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
  test:
    name: Run tests and lint
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Run tests and biome
        run: bun test

  e2e:
    name: Run Playwright E2E
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Setup Node (for Playwright tools)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start server in background and wait for readiness
        run: |
          bun run src/index.ts &
          pid=$!
          echo "Waiting for server to respond on http://localhost:3000/api/status..."
          for i in $(seq 1 30); do
            if curl -sSf http://localhost:3000/api/status -o /dev/null; then
              echo "Server is up"
              break
            fi
            sleep 1
          done
          # final check
          if ! curl -sSf http://localhost:3000/api/status -o /dev/null; then
            echo "Server failed to start after 30s" >&2
            ps aux | sed -n '1,200p'
            exit 1
          fi

      - name: Run Playwright webview test (with retries)
        env:
          RUN_PLAYWRIGHT: '1'
        run: |
          set -euo pipefail
          max_attempts=3
          attempt=1
          until [ $attempt -gt $max_attempts ]; do
            echo "Playwright attempt $attempt/$max_attempts"
            if npx playwright test e2e-tests/webview.spec.ts --reporter=list; then
              echo "Playwright succeeded"
              break
            fi
            echo "Playwright failed on attempt $attempt"
            attempt=$((attempt + 1))
            sleep 5
          done
          if [ $attempt -gt $max_attempts ]; then
            echo "Playwright failed after $max_attempts attempts" >&2
            exit 1
          fi

      - name: Upload Playwright screenshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yash-web-screenshot
          path: tmp/web/yash-home.png

  integration-hermetic:
    name: Integration (hermetic) - Playwright + reconnect
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Setup Node (for Playwright tools)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start server in background (hermetic) and wait for readiness
        run: |
          bun run src/index.ts &
          pid=$!
          echo "Waiting for server to respond on http://localhost:3000/api/status..."
          for i in $(seq 1 30); do
            if curl -sSf http://localhost:3000/api/status -o /dev/null; then
              echo "Server is up"
              break
            fi
            sleep 1
          done
          if ! curl -sSf http://localhost:3000/api/status -o /dev/null; then
            echo "Server failed to start after 30s" >&2
            ps aux | sed -n '1,200p'
            exit 1
          fi

      - name: Run Playwright webview test (hermetic, with retries)
        env:
          RUN_PLAYWRIGHT: '1'
        run: |
          set -euo pipefail
          max_attempts=3
          attempt=1
          until [ $attempt -gt $max_attempts ]; do
            echo "Hermetic Playwright attempt $attempt/$max_attempts"
            if npx playwright test e2e-tests/webview.spec.ts --reporter=list; then
              echo "Hermetic Playwright succeeded"
              break
            fi
            echo "Hermetic Playwright failed on attempt $attempt"
            attempt=$((attempt + 1))
            sleep 5
          done
          if [ $attempt -gt $max_attempts ]; then
            echo "Hermetic Playwright failed after $max_attempts attempts" >&2
            exit 1
          fi

      - name: Run reconnection integration test (with retries)
        run: |
          set -euo pipefail
          max_attempts=3
          attempt=1
          until [ $attempt -gt $max_attempts ]; do
            echo "Reconnection test attempt $attempt/$max_attempts"
            if bun test test/obs.websocket.reconnect.test.ts --reporter=list; then
              echo "Reconnection test succeeded"
              break
            fi
            echo "Reconnection test failed on attempt $attempt"
            attempt=$((attempt + 1))
            sleep 5
          done
          if [ $attempt -gt $max_attempts ]; then
            echo "Reconnection test failed after $max_attempts attempts" >&2
            exit 1
          fi

      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-screenshots
          path: tmp/web/yash-home.png

  vhs:
    name: Record TUI VHS demo
    needs: e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'

      - name: Install vhs (Charmbracelet)
        run: |
          export GOBIN="$HOME/go/bin"
          mkdir -p "$GOBIN"
          export PATH="$GOBIN:$PATH"
          go install github.com/charmbracelet/vhs@latest

      - name: Record VHS demo
        env:
          PATH: ${{ env.PATH }}:$HOME/go/bin
        run: |
          chmod +x tmp/tui/record.sh
          ./tmp/tui/record.sh

      - name: Render VHS to GIF
        env:
          PATH: ${{ env.PATH }}:$HOME/go/bin
        run: |
          export PATH="$HOME/go/bin:$PATH"
          vhs render tmp/tui/demo.tape --out tmp/tui/demo.gif

      - name: Upload VHS demo artifact
        uses: actions/upload-artifact@v4
        with:
          name: yash-tui-demo
          path: tmp/tui/demo.gif
