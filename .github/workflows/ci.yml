name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  secret-scan:
    name: Scan repository for likely plaintext secrets (blocking)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
  test:
    name: Run tests and lint
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Run tests and biome
        run: bun test

  e2e:
    name: Run Playwright E2E
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Setup Node (for Playwright tools)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start server in background and wait for readiness
        run: |
          bun run src/index.ts &
          pid=$!
          echo "Waiting for server to respond on http://localhost:3000/api/status..."
          for i in $(seq 1 30); do
            if curl -sSf http://localhost:3000/api/status -o /dev/null; then
              echo "Server is up"
              break
            fi
            sleep 1
          done
          # final check
          if ! curl -sSf http://localhost:3000/api/status -o /dev/null; then
            echo "Server failed to start after 30s" >&2
            ps aux | sed -n '1,200p'
            exit 1
          fi

      - name: Run Playwright webview test (with retries)
        env:
          RUN_PLAYWRIGHT: '1'
        run: |
          set -euo pipefail
          max_attempts=3
          attempt=1
          until [ $attempt -gt $max_attempts ]; do
            echo "Playwright attempt $attempt/$max_attempts"
            if npx playwright test e2e-tests/webview.spec.ts --reporter=list; then
              echo "Playwright succeeded"
              break
            fi
            echo "Playwright failed on attempt $attempt"
            attempt=$((attempt + 1))
            sleep 5
          done
          if [ $attempt -gt $max_attempts ]; then
            echo "Playwright failed after $max_attempts attempts" >&2
            exit 1
          fi

      - name: Upload Playwright screenshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yash-web-screenshot
          path: tmp/web/yash-home.png

  integration-hermetic:
    name: Integration (hermetic) - Playwright + reconnect
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image for hermetic tests
        run: |
          # Pass host UID/GID as build args so the image can optionally bake a
          # host-matching user. This helps artifact ownership when the image is
          # used on the runner. Use --progress=plain for clearer logs.
          docker build --build-arg HOST_UID="$(id -u)" --build-arg HOST_GID="$(id -g)" -t yash-ci:latest .

      - name: Image health-check (fast, non-test)
        run: |
          # Run a lightweight health check inside the built hermetic image as the
          # non-root runner user to fail fast on environment/tooling issues.
          mkdir -p tmp
          chmod +x scripts/ci/run_and_collect_artifacts.sh
          chmod +x scripts/ci/image_health_check.sh
          # This wrapper will copy any /app/tmp artifacts back to tmp/ and will
          # exit non-zero if the health check fails.
          ./scripts/ci/run_and_collect_artifacts.sh yash-ci:latest -- "bash scripts/ci/image_health_check.sh"

      - name: Run hermetic integration tests inside Docker image
        run: |
          # Ensure host tmp exists and is writable by the runner user
          mkdir -p tmp

          # Run container as current host user so artifacts written into the mounted
          # tmp directory are owned by the runner and can be uploaded as artifacts.
          # Also pass HOST_UID/HOST_GID into the container so the verification
          # script can attempt a chown when appropriate.
          # The Docker image builds dependencies (bun install + Playwright) at image build
          # time to speed up CI; do not reinstall inside the container here.
          CONTAINER_NAME="yash-ci-run-$(date +%s)-$RANDOM"
          # Run the container via the host-side wrapper script which will ensure
          # robust artifact collection and ownership fixing. The wrapper will
          # manage docker cp/tar fallbacks and run the fixer before upload.
          chmod +x scripts/ci/run_and_collect_artifacts.sh
          chmod +x scripts/ci/container_run.sh
          ./scripts/ci/run_and_collect_artifacts.sh yash-ci:latest -- "bash scripts/ci/container_run.sh"

          RUN_EXIT=$?
          echo "Container $CONTAINER_NAME exited with status $RUN_EXIT"
          echo "Attempting to docker cp /app/tmp from container to host tmp/ (if present)"
          mkdir -p tmp || true
          docker cp "$CONTAINER_NAME":/app/tmp/. tmp/ || echo "docker cp failed or no files present"
          # Remove the container now that we've extracted artifacts
          docker rm -f "$CONTAINER_NAME" || true
          # Exit with the same code the container run returned
          if [ $RUN_EXIT -ne 0 ]; then
            exit $RUN_EXIT
          fi

      - name: Fix host artifact ownership
        if: always()
        run: |
          echo "Running host-side artifact ownership fixer (if present)"
          # Use bash to avoid requiring executable bit on the script
          if [ -f scripts/ci/fix_host_artifact_ownership.sh ]; then
            bash scripts/ci/fix_host_artifact_ownership.sh tmp || echo "fixer failed or not permitted"
          else
            echo "No fixer script present; skipping"
          fi

      - name: Inspect host tmp artifacts
        if: always()
        run: |
          echo "Listing host tmp/ after container run"
          ls -la tmp || true
          if [ -f tmp/ci-artifact.txt ]; then
            echo "Artifact stat:";
            stat -c 'file=%n uid=%u gid=%g mode=%a' tmp/ci-artifact.txt || true
          fi
          if [ -f tmp/ci-artifact-owner.txt ]; then
            echo "Artifact owner file contents:";
            cat tmp/ci-artifact-owner.txt || true
          fi

      - name: Generate, remediate, and create artifact tar
        if: always()
        run: |
          echo "Preparing artifacts for upload: generate manifest, remediate ownership, create tarball"
          chmod +x scripts/ci/remediate_and_validate_artifacts.sh scripts/ci/create_artifact_tar.sh scripts/ci/generate_artifact_manifest.sh scripts/ci/validate_artifact_manifest.sh || true
          # Attempt remediation and validation. Non-zero exit means remediation failed
          # but we continue to collect artifacts for debugging.
          ./scripts/ci/remediate_and_validate_artifacts.sh tmp "$(id -u)" "$(id -g)" || echo "Remediation failed; continuing to collect artifacts for debugging"
          # Create a numeric-owner tarball of tmp/
          ./scripts/ci/create_artifact_tar.sh tmp || echo "Tarball creation failed"

      - name: Upload integration artifacts (tarball + manifest + diagnostics)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-artifacts
          path: |
            tmp/integration-artifacts-*.tar.gz
            tmp/artifact-manifest.json
            tmp/artifact-ownership-report.txt
            tmp/ci-env.txt
            tmp/**

      - name: Annotate artifact ownership mismatches
        if: always()
        run: |
          echo "Annotating artifact ownership mismatches in workflow logs"
          chmod +x scripts/ci/annotate_artifact_ownership.sh || true
          ./scripts/ci/annotate_artifact_ownership.sh tmp/artifact-ownership-report.txt "$(id -u)" "$(id -g)" || true

  vhs:
    name: Record TUI VHS demo
    needs: e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'

      - name: Install vhs (Charmbracelet)
        run: |
          export GOBIN="$HOME/go/bin"
          mkdir -p "$GOBIN"
          export PATH="$GOBIN:$PATH"
          go install github.com/charmbracelet/vhs@latest

      - name: Record VHS demo
        env:
          PATH: ${{ env.PATH }}:$HOME/go/bin
        run: |
          chmod +x tmp/tui/record.sh
          ./tmp/tui/record.sh

      - name: Render VHS to GIF
        env:
          PATH: ${{ env.PATH }}:$HOME/go/bin
        run: |
          export PATH="$HOME/go/bin:$PATH"
          vhs render tmp/tui/demo.tape --out tmp/tui/demo.gif

      - name: Upload VHS demo artifact
        uses: actions/upload-artifact@v4
        with:
          name: yash-tui-demo
          path: tmp/tui/demo.gif
