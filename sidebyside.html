<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YASH - Side by Side Chat</title>
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body class="yash-sidebyside">
  <header>
    <h1>YASH — Side by Side</h1>
    <button class="toggle-btn" id="toggle-youtube" data-platform="youtube">YouTube ✓</button>
    <button class="toggle-btn" id="toggle-twitch"  data-platform="twitch">Twitch ✓</button>
    <button class="toggle-btn" id="toggle-kick"    data-platform="kick">Kick ✓</button>
    <button id="position-btn" title="Toggle message box position">msgbox: bottom ▼</button>
  </header>

  <div id="system-feed"></div>

  <div id="columns">
    <div class="column" id="col-youtube">
      <div class="col-header youtube">YouTube</div>
      <div class="col-messages" id="msgs-youtube"></div>
    </div>
    <div class="column" id="col-twitch">
      <div class="col-header twitch">Twitch</div>
      <div class="col-messages" id="msgs-twitch"></div>
    </div>
    <div class="column" id="col-kick">
      <div class="col-header kick">Kick</div>
      <div class="col-messages" id="msgs-kick"></div>
    </div>
  </div>

  <div id="msgbox">
    <div class="yash-msgbox-row">
      <select id="platform-select" title="Target platform">
        <option value="all">all</option>
        <option value="youtube">youtube</option>
        <option value="twitch">twitch</option>
        <option value="kick">kick</option>
      </select>
      <textarea id="message-input" rows="1" placeholder="Type a message or /help for commands…"></textarea>
      <button id="send-btn">Send</button>
    </div>
    <div id="autocomplete-hint"></div>
  </div>

  <script type="module">
    import { getWebAutocomplete, handleWebCommand } from '/api/js/commands.js';

                                                                                                                            const PLATFORMS = ['youtube', 'twitch', 'kick'];
                                                                                                                                    const STORAGE_KEYS = {
                                                                                                                                      youtube: 'yash_sbs_youtube',
                                                                                                                                      twitch:  'yash_sbs_twitch',
                                                                                                                                      kick:    'yash_sbs_kick',
                                                                                                                                    };

                                                                                                                                    // Per-platform state
                                                                                                                                    const enabled = {};
                                                                                                                                    const knownIds = { youtube: new Set(), twitch: new Set(), kick: new Set() };
                                                                                                                                    const atBottom = { youtube: true, twitch: true, kick: true };

                                                                                                                                    function loadEnabled(platform) {
                                                                                                                                      const stored = localStorage.getItem(STORAGE_KEYS[platform]);
                                                                                                                                      return stored === null ? true : stored === 'true';
                                                                                                                                    }

                                                                                                                                    function applyToggle(platform) {
                                                                                                                                      const col = document.getElementById(`col-${platform}`);
                                                                                                                                      const btn = document.getElementById(`toggle-${platform}`);
                                                                                                                                      if (enabled[platform]) {
                                                                                                                                        col.classList.remove('hidden');
                                                                                                                                        btn.textContent = `${{ youtube: 'YouTube', twitch: 'Twitch', kick: 'Kick' }[platform]} ✓`;
                                                                                                                                        btn.className = `toggle-btn active-${platform}`;
                                                                                                                                      } else {
                                                                                                                                        col.classList.add('hidden');
                                                                                                                                        btn.textContent = `${{ youtube: 'YouTube', twitch: 'Twitch', kick: 'Kick' }[platform]} ✗`;
                                                                                                                                        btn.className = 'toggle-btn';
                                                                                                                                      }
                                                                                                                                    }

                                                                                                                                    // Init toggles
                                                                                                                                    for (const p of PLATFORMS) {
                                                                                                                                      enabled[p] = loadEnabled(p);
                                                                                                                                      applyToggle(p);

                                                                                                                                      document.getElementById(`toggle-${p}`).addEventListener('click', () => {
                                                                                                                                        enabled[p] = !enabled[p];
                                                                                                                                        localStorage.setItem(STORAGE_KEYS[p], String(enabled[p]));
                                                                                                                                        applyToggle(p);
                                                                                                                                      });

                                                                                                                                      document.getElementById(`msgs-${p}`).addEventListener('scroll', () => {
                                                                                                                                        const el = document.getElementById(`msgs-${p}`);
                                                                                                                                        atBottom[p] = el.scrollHeight - el.scrollTop - el.clientHeight < 32;
                                                                                                                                      });
                                                                                                                                    }

                                                                                                                                    function escapeHtml(str) {
                                                                                                                                      return String(str)
                                                                                                                                        .replace(/&/g, '&amp;')
                                                                                                                                        .replace(/</g, '&lt;')
                                                                                                                                        .replace(/>/g, '&gt;')
                                                                                                                                        .replace(/"/g, '&quot;');
                                                                                                                                    }

                                                                                                                                    function appendMessages(msgs) {
                                                                                                                                      for (const p of PLATFORMS) {
                                                                                                                                        const el = document.getElementById(`msgs-${p}`);
                                                                                                                                        let added = false;
                                                                                                                                        for (const msg of msgs) {
                                                                                                                                          if (msg.platform !== p) continue;
                                                                                                                                          if (knownIds[p].has(msg.id)) continue;
                                                                                                                                          knownIds[p].add(msg.id);
                                                                                                                                          const div = document.createElement('div');
                                                                                                                                          div.className = 'msg';
                                                                                                                                          div.innerHTML =
                                                                                                                                            `<span class="username">${escapeHtml(msg.username)}:</span>` +
                                                                                                                                            `<span class="text">${escapeHtml(msg.message)}</span>`;
                                                                                                                                          el.appendChild(div);
                                                                                                                                          added = true;
                                                                                                                                        }
                                                                                                                                        if (added && atBottom[p]) {
                                                                                                                                          el.scrollTop = el.scrollHeight;
                                                                                                                                        }
                                                                                                                                      }
                                                                                                                                    }

                                                                                                                                    async function fetchHistory() {
                                                                                                                                      try {
                                                                                                                                        const res = await fetch('/api/chat/history');
                                                                                                                                        if (!res.ok) return;
                                                                                                                                        const msgs = await res.json();
                                                                                                                                        appendMessages(msgs);
                                                                                                                                      } catch (_) {}
                                                                                                                                    }

                                                                                                                                    fetchHistory();
                                                                                                                                    setInterval(fetchHistory, 2000);

                                                                                                                                    // ── Message box ──────────────────────────────────────────────
                                                                                                                                    const STORAGE_KEY_POS = 'yash_sbs_msgbox_position';
                                                                                                                                    const POSITIONS = ['bottom', 'top', 'hide'];

                                                                                                                                    const msgboxEl = document.getElementById('msgbox');
                                                                                                                                    const positionBtn = document.getElementById('position-btn');
                                                                                                                                    const platformSelect = document.getElementById('platform-select');
                                                                                                                                    const messageInput = document.getElementById('message-input');
                                                                                                                                    const sendBtn = document.getElementById('send-btn');
                                                                                                                                    const systemFeedEl = document.getElementById('system-feed');
                                                                                                                                    const autocompleteHint = document.getElementById('autocomplete-hint');

                                                                                                                                    const inputHistory = [];
                                                                                                                                    let historyIdx = -1;

                                                                                                                                    let currentPosition = localStorage.getItem(STORAGE_KEY_POS) || 'bottom';

                                                                                                                                    function applyPosition(pos) {
                                                                                                                                      currentPosition = pos;
                                                                                                                                      localStorage.setItem(STORAGE_KEY_POS, pos);
                                                                                                                                      msgboxEl.classList.remove('position-top');
                                                                                                                                      if (pos === 'hide') {
                                                                                                                                        msgboxEl.style.display = 'none';
                                                                                                                                        positionBtn.textContent = 'msgbox: hide ●';
                                                                                                                                      } else if (pos === 'top') {
                                                                                                                                        msgboxEl.style.display = 'flex';
                                                                                                                                        msgboxEl.classList.add('position-top');
                                                                                                                                        positionBtn.textContent = 'msgbox: top ▲';
                                                                                                                                      } else {
                                                                                                                                        msgboxEl.style.display = 'flex';
                                                                                                                                        positionBtn.textContent = 'msgbox: bottom ▼';
                                                                                                                                      }
                                                                                                                                    }

                                                                                                                                    positionBtn.addEventListener('click', () => {
                                                                                                                                      const idx = POSITIONS.indexOf(currentPosition);
                                                                                                                                      applyPosition(POSITIONS[(idx + 1) % POSITIONS.length]);
                                                                                                                                    });

                                                                                                                                    applyPosition(currentPosition);

                                                                                                                                    // Auto-resize textarea + live autocomplete hint
                                                                                                                                    messageInput.addEventListener('input', () => {
                                                                                                                                      historyIdx = -1;
                                                                                                                                      messageInput.style.height = 'auto';
                                                                                                                                      messageInput.style.height = `${Math.min(messageInput.scrollHeight, 80)}px`;
                                                                                                                                      const hint = getWebAutocomplete(messageInput.value);
                                                                                                                                      autocompleteHint.textContent = hint ?? '';
                                                                                                                                    });

                                                                                                                                    // System feedback strip (UI-only, stays local)
                                                                                                                                    function appendSys(label, text) {
                                                                                                                                      systemFeedEl.classList.add('visible');
                                                                                                                                      const line = document.createElement('div');
                                                                                                                                      line.className = 'sys-line';
                                                                                                                                      line.textContent = `[${label}] ${text}`;
                                                                                                                                      systemFeedEl.appendChild(line);
                                                                                                                                      systemFeedEl.scrollTop = systemFeedEl.scrollHeight;
                                                                                                                                    }

                                                                                                                                    async function sendMessage() {
                                                                                                                                      const text = messageInput.value.trim();
                                                                                                                                      if (!text) return;

                                                                                                                                      const platform = platformSelect.value;
                                                                                                                                      const platforms = platform === 'all' ? [] : [platform];

                                                                                                                                      inputHistory.push(text);
                                                                                                                                      historyIdx = -1;

                                                                                                                                      sendBtn.disabled = true;

                                                                                                                                      // Delegate / commands to the shared handler from /api/js/commands.js
                                                                                                                                      const handled = await handleWebCommand(text, { platforms, feedback: appendSys });
                                                                                                                                      if (handled) {
                                                                                                                                        messageInput.value = '';
                                                                                                                                        messageInput.style.height = 'auto';
                                                                                                                                        autocompleteHint.textContent = '';
                                                                                                                                        sendBtn.disabled = false;
                                                                                                                                        messageInput.focus();
                                                                                                                                        return;
                                                                                                                                      }

                                                                                                                                      try {
                                                                                                                                        const res = await fetch('/api/chat/send', {
                                                                                                                                          method: 'POST',
                                                                                                                                          headers: { 'Content-Type': 'application/json' },
                                                                                                                                          body: JSON.stringify({ message: text, platforms }),
                                                                                                                                        });
                                                                                                                                        if (res.ok) {
                                                                                                                                          messageInput.value = '';
                                                                                                                                          messageInput.style.height = 'auto';
                                                                                                                                          autocompleteHint.textContent = '';
                                                                                                                                        }
                                                                                                                                      } catch (_) {}
                                                                                                                                      sendBtn.disabled = false;
                                                                                                                                      messageInput.focus();
                                                                                                                                    }

                                                                                                                                    sendBtn.addEventListener('click', sendMessage);
                                                                                                                                    messageInput.addEventListener('keydown', (e) => {
                                                                                                                                      if (e.key === 'ArrowUp') {
                                                                                                                                        e.preventDefault();
                                                                                                                                        if (inputHistory.length === 0) return;
                                                                                                                                        if (historyIdx === -1) historyIdx = inputHistory.length - 1;
                                                                                                                                        else if (historyIdx > 0) historyIdx--;
                                                                                                                                        messageInput.value = inputHistory[historyIdx];
                                                                                                                                        messageInput.style.height = 'auto';
                                                                                                                                        messageInput.style.height = `${Math.min(messageInput.scrollHeight, 80)}px`;
                                                                                                                                        return;
                                                                                                                                      }
                                                                                                                                      if (e.key === 'ArrowDown') {
                                                                                                                                        e.preventDefault();
                                                                                                                                        if (historyIdx === -1) return;
                                                                                                                                        historyIdx++;
                                                                                                                                        if (historyIdx >= inputHistory.length) {
                                                                                                                                          historyIdx = -1;
                                                                                                                                          messageInput.value = '';
                                                                                                                                        } else {
                                                                                                                                          messageInput.value = inputHistory[historyIdx];
                                                                                                                                        }
                                                                                                                                        messageInput.style.height = 'auto';
                                                                                                                                        messageInput.style.height = `${Math.min(messageInput.scrollHeight, 80)}px`;
                                                                                                                                        return;
                                                                                                                                      }
                                                                                                                                      if (e.key === 'Enter' && !e.shiftKey) {
                                                                                                                                        e.preventDefault();
                                                                                                                                        sendMessage();
                                                                                                                                      }
                                                                                                                                    });
  </script>
</body>
</html>
